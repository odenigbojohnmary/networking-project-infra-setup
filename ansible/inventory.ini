# Populate this after `terraform apply` using the `instance_public_ip` and `instance_private_ip` outputs from Terraform. The public IP is for the app VM, which is reachable from the internet. The private IP is for the DB VM, which is only reachable from within the VPC (e.g., via the app VM).

[webservers]
dbs-app-server ansible_host=REPLACE_WITH_APP_PUBLIC_IP ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa

[dbservers]
dbs-db-server ansible_host=REPLACE_WITH_DB_PRIVATE_IP ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa

# The DB VM has no public IP, so it can't be reached directly from outside the VPC. Ansible must connect to it via the app VM, which has a public IP and can reach the DB VM over the private subnet.
[dbservers:vars]
ansible_ssh_common_args=-o ProxyCommand="ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -W %h:%p ubuntu@REPLACE_WITH_APP_PUBLIC_IP"

[all:vars]
ansible_python_interpreter=/usr/bin/python3
