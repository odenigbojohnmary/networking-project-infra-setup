---
# Part 2 - Configuration Management / Part 3-4 - Application Deployment
#
# A single playbook, split into two tag groups, so there is one source of
# truth for "what does a correctly configured host look like":
#
#   --tags configure   Installs Docker Engine and enables it on boot.
#                       Run by .github/workflows/infra.yml, immediately
#                       after `terraform apply` provisions the VM.
#
#   --tags deploy       Pulls the latest application image and (re)starts
#                       the container. Run by .github/workflows/deploy-app.yml
#                       on every push to the application code.
#
# Running the whole file with no --tags performs both in sequence, which is
# still useful for a first-time manual bring-up of a brand new VM.

- name: Configure DevOps server and deploy sample application
  hosts: webservers
  become: true
  vars:
    docker_compose_version: "v2.29.2"
    app_image: "ghcr.io/OWNER/dbs-flask-app:latest"   # overridden by CI/CD at deploy time
    app_container_name: "dbs-flask-app"
    app_host_port: 5000
    app_container_port: 5000

  tasks:
    # ---------------------------------------------------------------
    # tag: configure - infrastructure/configuration layer (Part 2)
    # ---------------------------------------------------------------
    - name: Update apt package cache
      apt:
        update_cache: true
        cache_valid_time: 3600
      tags: [configure]

    - name: Install prerequisite packages
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
      tags: [configure]

    - name: Create keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"
      tags: [configure]

    - name: Add Docker's official GPG key
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"
      tags: [configure]

    - name: Add Docker apt repository
      apt_repository:
        repo: "deb [arch={{ ansible_architecture | regex_replace('x86_64','amd64') }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        filename: docker
      tags: [configure]

    - name: Install Docker Engine and plugins
      apt:
        update_cache: true
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
      tags: [configure]

    - name: Ensure docker group exists
      group:
        name: docker
        state: present
      tags: [configure]

    - name: Add ansible_user to the docker group
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true
      tags: [configure]

    - name: Enable and start Docker service (starts automatically on boot)
      systemd:
        name: docker
        enabled: true
        state: started
        daemon_reload: true
      tags: [configure]

    - name: Verify Docker is operational
      command: docker info
      register: docker_info
      changed_when: false
      tags: [configure]

    # ---------------------------------------------------------------
    # tag: deploy - application deployment layer (Part 3 / Part 4)
    # ---------------------------------------------------------------
    - name: Log in to GitHub Container Registry (uses secrets injected by CI/CD)
      community.docker.docker_login:
        registry_url: ghcr.io
        username: "{{ lookup('env', 'REGISTRY_USER') }}"
        password: "{{ lookup('env', 'REGISTRY_TOKEN') }}"
      when: lookup('env', 'REGISTRY_TOKEN') != ''
      no_log: true
      tags: [deploy]

    - name: Pull the latest application image
      community.docker.docker_image:
        name: "{{ app_image }}"
        source: pull
        force_source: true
      tags: [deploy]

    - name: Remove any previous application container
      community.docker.docker_container:
        name: "{{ app_container_name }}"
        state: absent
      tags: [deploy]

    - name: Run the containerised Flask application
      community.docker.docker_container:
        name: "{{ app_container_name }}"
        image: "{{ app_image }}"
        state: started
        restart_policy: always
        published_ports:
          - "{{ app_host_port }}:{{ app_container_port }}"
      tags: [deploy]
