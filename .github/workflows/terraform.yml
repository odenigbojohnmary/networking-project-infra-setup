name: Terraform

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
      - "ansible/playbook.yml"

  pull_request:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
      - "ansible/playbook.yml"

  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  TF_VERSION: "1.9.8"
  TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
  TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}

jobs:
  terraform-plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        run: |
          terraform plan \
            -out=tfplan \
            -input=false

      - name: Save Plan Output
        working-directory: terraform
        run: |
          terraform show -no-color tfplan > plan.txt

      - name: Comment Plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan.txt', 'utf8');

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Terraform Plan\n\`\`\`\n${plan.substring(0, 60000)}\n\`\`\``
            })

  terraform-apply:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    environment:
      name: production

    outputs:
      instance_ip: ${{ steps.tf_outputs.outputs.instance_ip }}
      db_private_ip: ${{ steps.tf_outputs.outputs.db_private_ip }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        run: terraform plan -out=tfplan -input=false

      - name: Terraform Apply
        working-directory: terraform
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        run: terraform apply -auto-approve tfplan
      
      - name: Capture VM addresses
        id: tf_outputs
        working-directory: terraform
        run: |
          echo "instance_ip=$(terraform output -raw instance_public_ip)" >> "$GITHUB_OUTPUT"
          echo "db_private_ip=$(terraform output -raw db_instance_private_ip)" >> "$GITHUB_OUTPUT"

  configure:
    name: Ansible configure (Docker+nginx on app VM, MySQL on private DB VM)
    needs: terraform-apply
    runs-on: ubuntu-latest
    env:
      APP_IP: ${{ needs.terraform-apply.outputs.instance_ip }}
      DB_IP: ${{ needs.terraform-apply.outputs.db_private_ip }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Ansible and required collections
        run: |
          python3 -m pip install --upgrade pip
          pip install ansible pymysql
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GCP_VM_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$APP_IP" >> ~/.ssh/known_hosts

      - name: Generate inventory from Terraform output
        run: |
          cat > ansible/inventory.ini << EOI
          [webservers]
          dbs-app-server ansible_host=${APP_IP} ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa

          [dbservers]
          dbs-db-server ansible_host=${DB_IP} ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa

          [dbservers:vars]
          ansible_ssh_common_args=-o ProxyCommand="ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -W %h:%p ubuntu@${APP_IP}"

          [all:vars]
          ansible_python_interpreter=/usr/bin/python3
          EOI

      - name: Wait for SSH to come up on the app VM
        run: |
          for i in {1..15}; do
            ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ubuntu@"$APP_IP" true && break
            echo "Waiting for SSH on app VM..."; sleep 10
          done

      - name: Wait for SSH to come up on the private DB VM (via ProxyJump through the app VM)
        run: |
          for i in {1..15}; do
            ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
              -o ProxyCommand="ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -W %h:%p ubuntu@${APP_IP}" \
              ubuntu@"$DB_IP" true && break
            echo "Waiting for SSH on DB VM..."; sleep 10
          done

      - name: Run Ansible playbook (configure tag only - Docker+nginx on app VM, MySQL on DB VM)
        working-directory: ansible
        run: ansible-playbook -i inventory.ini playbook.yml --tags configure

      - name: Print resulting VM addresses
        run: |
          echo "App VM (public):  $APP_IP"
          echo "DB VM (private):  $DB_IP  — reachable only from inside the VPC"
