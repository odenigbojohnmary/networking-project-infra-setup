---
# Part 2 - Configuration Management
# Installs and enables Docker and nginx on the app VM, and MySQL on the
# private DB VM. Two plays, one file, so both hosts are configured by a
# single `ansible-playbook playbook.yml`

- name: Configure DevOps server (Docker host + nginx reverse proxy)
  hosts: webservers
  become: true
  vars:
    app_upstream_port: 5000

  tasks:
    # ---------------------------------------------------------------
    # Docker Engine
    # ---------------------------------------------------------------
    - name: Update apt package cache
      apt:
        update_cache: true
        cache_valid_time: 3600
      tags: [configure]

    - name: Install prerequisite packages
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
      tags: [configure]

    - name: Create keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"
      tags: [configure]

    - name: Add Docker's official GPG key
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"
      tags: [configure]

    - name: Add Docker apt repository
      apt_repository:
        repo: "deb [arch={{ ansible_architecture | regex_replace('x86_64','amd64') }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        filename: docker
      tags: [configure]

    - name: Install Docker Engine and plugins
      apt:
        update_cache: true
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
      tags: [configure]

    - name: Ensure docker group exists
      group:
        name: docker
        state: present
      tags: [configure]

    - name: Add ansible_user to the docker group
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true
      tags: [configure]

    - name: Enable and start Docker service (starts automatically on boot)
      systemd:
        name: docker
        enabled: true
        state: started
        daemon_reload: true
      tags: [configure]

    - name: Verify Docker is operational
      command: docker info
      register: docker_info
      changed_when: false
      tags: [configure]

    # nginx — reverse proxy from :80 to the app's expected port (:5000)
    - name: Install nginx
      apt:
        name: nginx
        state: present
      tags: [configure]

    - name: Remove default nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Reload nginx
      tags: [configure]

    - name: Template the reverse proxy site config
      template:
        src: templates/app-proxy.conf.j2
        dest: /etc/nginx/sites-available/app-proxy.conf
        owner: root
        group: root
        mode: "0644"
      notify: Reload nginx
      tags: [configure]

    - name: Enable the reverse proxy site
      file:
        src: /etc/nginx/sites-available/app-proxy.conf
        dest: /etc/nginx/sites-enabled/app-proxy.conf
        state: link
      notify: Reload nginx
      tags: [configure]

    - name: Enable and start nginx service (starts automatically on boot)
      systemd:
        name: nginx
        enabled: true
        state: started
        daemon_reload: true
      tags: [configure]

  handlers:
    - name: Reload nginx
      systemd:
        name: nginx
        state: reloaded

# Database VM — self-managed MySQL, private subnet, no public IP.
# Reached from this Ansible run via SSH ProxyJump through the app VM.

- name: Configure database VM (MySQL)
  hosts: dbservers
  become: true
  vars:
    db_name: "{{ lookup('env', 'DB_NAME') | default('appdb', true) }}"
    db_user: "{{ lookup('env', 'DB_USER') | default('appuser', true) }}"
    db_password: "{{ lookup('env', 'DB_PASSWORD') }}"
    db_allowed_host: "10.0.1.%"

  tasks:
    - name: Update apt package cache
      apt:
        update_cache: true
        cache_valid_time: 3600
      tags: [configure]

    - name: Install MySQL server and Python MySQL client library
      apt:
        name:
          - mysql-server
          - python3-pymysql
        state: present
      tags: [configure]

    - name: Enable and start MySQL service (starts automatically on boot)
      systemd:
        name: mysql
        enabled: true
        state: started
        daemon_reload: true
      tags: [configure]

    - name: Allow MySQL to listen on the VM's private interface, not just localhost
      lineinfile:
        path: /etc/mysql/mysql.conf.d/mysqld.cnf
        regexp: "^bind-address"
        line: "bind-address = 0.0.0.0"
      notify: Restart MySQL
      tags: [configure]

    - name: Create the application database
      community.mysql.mysql_db:
        name: "{{ db_name }}"
        state: present
        login_unix_socket: /var/run/mysqld/mysqld.sock
      tags: [configure]

    - name: Create the application database user, scoped to the public subnet
      community.mysql.mysql_user:
        name: "{{ db_user }}"
        password: "{{ db_password }}"
        host: "{{ db_allowed_host }}"
        priv: "{{ db_name }}.*:ALL"
        state: present
        login_unix_socket: /var/run/mysqld/mysqld.sock
      no_log: true
      tags: [configure]

  handlers:
    - name: Restart MySQL
      systemd:
        name: mysql
        state: restarted
